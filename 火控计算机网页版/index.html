<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f0c040">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="f9kdalv7oc0eayxatkrvx5o98v0uftc.png">
    <title>弹道计算机</title>
    <link rel="stylesheet" href="style.css">
    <script data-cfasync="false" src="app.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>🔧 弹道计算机</h1>
            <label class="header-toggle" title="粘贴时自动填充炮位和侦察哨坐标">
                <input type="checkbox" id="auto-fill-toggle" onchange="toggleAutoFill()">
                <span class="toggle-track"></span>
                <span class="toggle-label">自动</span>
            </label>
        </header>

        <main class="app-content">
            <section id="page-calculator" class="page active">
                <div class="card">
                    <div class="card-title">炮位设置</div>
                    <div class="input-group">
                        <label>铁巢坐标</label>
                        <div class="input-row">
                            <input type="text" id="cannon-pos" placeholder="例：C2 3:4 或 C234" value="C2 3:4">
                            <button class="btn btn-secondary" onclick="confirmCannonPos()" style="flex-shrink:0; width:auto; padding:10px 16px;">确定</button>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>目标坐标</label>
                        <input type="text" id="target-pos" placeholder="例：N449 7:0 或 N44970">
                    </div>
                    <button class="btn btn-primary btn-block" onclick="calculateFiring()">计算并打印</button>
                </div>

                <div class="card">
                    <div class="card-title">弹种选择</div>
                    <div class="ammo-selector">
                        <button class="ammo-btn ap" data-ammo="AP" onclick="selectAmmo('AP')">AP</button>
                        <button class="ammo-btn he" data-ammo="HE" onclick="selectAmmo('HE')">HE</button>
                        <button class="ammo-btn hche" data-ammo="HCHE" onclick="selectAmmo('HCHE')">HCHE</button>
                        <button class="ammo-btn star active" data-ammo="STAR" onclick="selectAmmo('STAR')">STAR</button>
                    </div>
                </div>

                <div class="card current-cannon">
                    <span>当前炮位：</span>
                    <span id="current-cannon-display">C2 3:4</span>
                </div>

                <div class="card">
                    <div class="card-title">
                        计算记录
                        <button class="btn-clear" onclick="clearHistory()">清空全部</button>
                    </div>
                    <div id="history-list" class="history-list"></div>
                </div>
            </section>

            <section id="page-scout" class="page">
                <div class="card">
                    <div class="card-title">
                        剪贴板导入
                        <button class="btn-clear" onclick="clearClipboard()">清空</button>
                    </div>
                    <div class="input-group">
                        <label>粘贴游戏数据（自动识别参考点、目标等）</label>
                        <textarea id="clipboard-input" rows="6" placeholder="例：&#10;参考点 Alpha：&#10;   从 Spotter#1 方位角 107°&#10;   距 Spotter#2 6.47km&#10;.&#10;Target#1 位于 - Q4 4:2"></textarea>
                    </div>
                    <div class="input-row">
                        <button class="btn btn-secondary" onclick="parseClipboard()">解析数据</button>
                        <button class="btn btn-primary" onclick="parseAndImport()">解析并导入</button>
                    </div>
                    <div id="parse-result" class="result-box" style="display:none;">
                        <div class="result-title">解析结果</div>
                        <div id="parse-result-content" style="font-size:13px;line-height:1.6;"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">
                        点管理
                        <button class="btn-clear" onclick="clearAllPoints()">清空全部</button>
                    </div>
                    <div class="tabs-small">
                        <button class="tab-small-btn active" data-tab="spotters" onclick="switchSmallTab('spotters')">侦察哨</button>
                        <button class="tab-small-btn" data-tab="refs" onclick="switchSmallTab('refs')">参考点</button>
                        <button class="tab-small-btn" data-tab="targets" onclick="switchSmallTab('targets')">敌方目标</button>
                    </div>
                    
                    <div id="tab-spotters" class="tab-small-content active">
                        <div class="input-row">
                            <input type="text" id="spotter-name" placeholder="名称（如 Spotter#1）">
                            <input type="text" id="spotter-pos" placeholder="坐标">
                            <button class="btn btn-primary" onclick="addPoint('spotter')">添加</button>
                        </div>
                        <div id="spotter-list" class="point-list"></div>
                    </div>
                    
                    <div id="tab-refs" class="tab-small-content">
                        <div class="input-row">
                            <input type="text" id="ref-name" placeholder="名称（如 Alpha）">
                            <input type="text" id="ref-pos" placeholder="坐标（可选）">
                            <button class="btn btn-primary" onclick="addPoint('ref')">添加</button>
                        </div>
                        <div id="ref-list" class="point-list"></div>
                    </div>
                    
                    <div id="tab-targets" class="tab-small-content">
                        <div class="input-row">
                            <input type="text" id="target-name-scout" placeholder="名称（如 Target#1）">
                            <input type="text" id="target-pos-scout" placeholder="坐标（可选）">
                            <button class="btn btn-primary" onclick="addPoint('target')">添加</button>
                        </div>
                        <div id="target-list" class="point-list"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">三角定位计算</div>
                    <div class="calc-section">
                        <div class="input-group">
                            <label>计算对象</label>
                            <select id="calc-target-type">
                                <option value="ref">参考点</option>
                                <option value="target">敌方目标</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>对象名称</label>
                            <input type="text" id="calc-target-name" placeholder="如 Alpha / Target#1">
                        </div>
                    </div>

                    <div class="calc-section">
                        <div class="section-subtitle">已知条件 1</div>
                        <div class="input-row">
                            <select id="cond1-type" onchange="updateCondInputs()">
                                <option value="bearing">方位角</option>
                                <option value="distance">距离</option>
                            </select>
                            <select id="cond1-from"></select>
                            <input type="number" id="cond1-value" placeholder="度数/公里" step="0.01">
                        </div>
                    </div>

                    <div class="calc-section">
                        <div class="section-subtitle">已知条件 2</div>
                        <div class="input-row">
                            <select id="cond2-type" onchange="updateCondInputs()">
                                <option value="bearing">方位角</option>
                                <option value="distance">距离</option>
                            </select>
                            <select id="cond2-from"></select>
                            <input type="number" id="cond2-value" placeholder="度数/公里" step="0.01">
                        </div>
                    </div>

                    <button class="btn btn-primary btn-block" onclick="triangulate()">计算坐标</button>
                    
                    <div id="triangulate-result" class="result-box" style="display:none;">
                        <div class="result-title">计算结果</div>
                        <div class="result-coord" id="result-coord"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">快速定位（方位角+距离）</div>
                    <div class="input-group">
                        <label>基准点</label>
                        <select id="quick-from"></select>
                    </div>
                    <div class="input-row">
                        <input type="number" id="quick-bearing" placeholder="方位角" step="0.1">
                        <input type="number" id="quick-distance" placeholder="距离(km)" step="0.01">
                    </div>
                    <button class="btn btn-secondary btn-block" onclick="quickLocate()">快速计算坐标</button>
                    <div id="quick-result" class="result-box" style="display:none;">
                        <div class="result-title">计算结果</div>
                        <div class="result-coord" id="quick-result-coord"></div>
                    </div>
                </div>
            </section>

            <section id="page-map" class="page">
                <div class="card">
                    <div class="card-title">战术地图</div>
                    <div class="map-container">
                        <div class="canvas-wrapper">
                            <canvas id="radarCanvas" width="800" height="400"></canvas>
                            <div class="map-hint">滚轮:缩放 | 右键拖移 | 左键选点</div>
                        </div>
                    </div>
                    <div class="map-sidebar">
                        <div class="map-controls">
                            <div class="map-legend">
                                <div class="legend-item"><span class="legend-dot gun"></span>炮位</div>
                                <div class="legend-item"><span class="legend-dot spotter"></span>侦察哨</div>
                                <div class="legend-item"><span class="legend-dot ref"></span>参考点</div>
                                <div class="legend-item"><span class="legend-dot target"></span>敌方目标</div>
                                <div class="legend-item"><span class="legend-dot enemy"></span>游戏敌人</div>
                            </div>
                            <div class="map-buttons">
                                <button class="btn btn-secondary" onclick="resetMapView()">重置视图</button>
                                <button class="btn btn-primary" onclick="refreshMap()">刷新</button>
                            </div>
                        </div>

                        <div class="card" style="margin-top:12px;">
                            <div class="card-title">地图打击设置</div>
                            <div class="ammo-selector" style="margin-bottom:12px;">
                                <button class="ammo-btn ap" data-ammo="AP" onclick="selectAmmo('AP')">AP</button>
                                <button class="ammo-btn he" data-ammo="HE" onclick="selectAmmo('HE')">HE</button>
                                <button class="ammo-btn hche" data-ammo="HCHE" onclick="selectAmmo('HCHE')">HCHE</button>
                                <button class="ammo-btn star" data-ammo="STAR" onclick="selectAmmo('STAR')">STAR</button>
                            </div>
                            <div class="map-strike-options">
                                <label class="inline-toggle">
                                    <input type="checkbox" id="map-auto-fire-toggle">
                                    <span>自动开火</span>
                                </label>
                                <label class="inline-toggle">
                                    <input type="checkbox" id="map-max-charge-toggle">
                                    <span>最大装药</span>
                                </label>
                            </div>
                        </div>

                        <div class="recon-box">
                            <h3>侦察机路线模拟</h3>
                            <div class="manual-row">
                                <label style="width:60px;">目标网格:</label><input type="text" id="recon-grid" placeholder="如 E5 5:5">
                                <label style="width:30px; text-align:right;">角度:</label><input type="number" id="recon-angle" placeholder="0-360" step="0.1">
                            </div>
                            <button class="btn-override" id="btn-recon-mode" style="background:#0284c7;">🗺️ 开启地图选点 (双击模式)</button>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">点位列表</div>
                    <div id="map-points-list" class="map-points-list"></div>
                </div>
            </section>

        </main>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-page="calculator" onclick="switchPage('calculator')">
                <span class="nav-icon">🎯</span>
                <span class="nav-label">射击计算</span>
            </button>
            <button class="nav-btn" data-page="scout" onclick="switchPage('scout')">
                <span class="nav-icon">📡</span>
                <span class="nav-label">侦察定位</span>
            </button>
            <button class="nav-btn" data-page="map" onclick="switchPage('map')">
                <span class="nav-icon">🗺️</span>
                <span class="nav-label">地图</span>
            </button>
        </nav>
    </div>
</body>
</html>
